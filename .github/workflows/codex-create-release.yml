name: Publish v1.0.1

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/codex-create-release.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: v1.0.1
          RELEASE_TITLE: Fix Back Office Product Name v1.0.1
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi
          notes_file="$RUNNER_TEMP/release-notes.md"
          cat >"$notes_file" <<'RELEASE_NOTES'
          ## Highlights
          
          - Repairs existing disabled-language product names during installation.
          - Keeps disabled-language names aligned after each product update.
          - Limits updates to the active shop and disabled languages.
          - Safely skips processing when no disabled language exists.
          - Requires no configuration and adds no custom database tables.
          
          ## Compatibility
          
          - PrestaShop 1.6 and later
          
          Back up the database before installation because this module intentionally updates existing `product_lang` rows.
          RELEASE_NOTES
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file "$notes_file"
